<!DOCTYPE html>
<html lang="so">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>31 May Digital Tax - PWA</title>
  
  <!-- PWA Manifest & Icons -->
  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIjMxIE1heSBEaWdpdGFsIFRheCIsCiAgInNob3J0X25hbWUiOiAiMzFNYXlUYXgiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzFhNWY3YSIsCiAgInRoZW1lX2NvbG9yIjogIiMxYTVmN2EiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZnJlZXBpay5jb20vNTEyLzI1ODkvMjU4OTExOC5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">
  <meta name="theme-color" content="#1a5f7a">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
  
  <style>
    :root {
      --primary: #1a5f7a;
      --secondary: #159895;
      --accent: #57c5b6;
      --light: #f8fafc;
    }

    body {
      background-color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      margin: 0;
      padding: 10px;
    }

    .pwa-card {
      max-width: 480px;
      margin: auto;
      background: white;
      border-radius: 30px;
      min-height: 92vh;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      padding: 30px 20px;
      text-align: center;
      border-radius: 0 0 30px 30px;
    }

    .status-pill {
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      margin-top: 8px;
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .content-area {
      padding: 20px;
      flex-grow: 1;
    }

    .clock-box {
      background: #f1f5f9;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      margin-bottom: 20px;
      border: 1px solid #e2e8f0;
    }

    .time-txt { font-size: 24px; font-weight: 800; color: var(--primary); }
    .date-txt { font-size: 12px; color: #64748b; }

    .form-floating > .form-control {
      border-radius: 15px;
      background: #f8fafc;
    }

    .btn-action {
      background: var(--primary);
      color: white;
      padding: 15px;
      border-radius: 15px;
      width: 100%;
      border: none;
      font-weight: 700;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn-action:active { transform: scale(0.96); }

    .camera-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin: 15px 0;
    }

    .cam-btn {
      background: #f1f5f9;
      border: 2px dashed #cbd5e1;
      padding: 15px;
      text-align: center;
      border-radius: 15px;
      cursor: pointer;
    }

    .cam-btn i { font-size: 20px; color: var(--secondary); display: block; margin-bottom: 5px; }
    .cam-btn span { font-size: 10px; font-weight: 700; color: #475569; }

    .ai-box {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 20px;
      padding: 15px;
      margin-top: 15px;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.9);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
  </style>
</head>
<body>

<div id="loader">
  <div class="spinner-border text-primary"></div>
  <p class="mt-2 fw-bold">Xogta waa la hawl-gelinayaa...</p>
</div>

<div class="pwa-card">
  <div class="app-header">
    <h3 class="mb-0 fw-black">DEGMADA 31 MAY</h3>
    <p class="mb-0 small opacity-75">New Hargeisa Digital Tax System</p>
    <div class="status-pill" id="net-status"><i class="fas fa-circle text-success me-1"></i> Online</div>
  </div>

  <div class="content-area">
    <!-- Watch & Date -->
    <div class="clock-box">
      <div class="time-txt" id="watch">00:00:00</div>
      <div class="date-txt" id="full-date">Arbacada, 25 Mar 2026</div>
      <div class="small text-success fw-bold" id="hijri">Ramadaan 1447</div>
    </div>

    <!-- Login Section -->
    <div id="login-sec">
      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="sid" placeholder="Staff ID">
        <label>Staff ID (e.g. 112233)</label>
      </div>
      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="pin" placeholder="PIN">
        <label>Daily PIN</label>
      </div>
      <button class="btn-action shadow-lg" onclick="doLogin()">GALI SYSTEM-KA</button>
    </div>

    <!-- Main Action Section -->
    <div id="main-sec" style="display:none">
      <div class="d-flex justify-content-between mb-3 align-items-center">
        <h6 class="mb-0 text-primary">Guri: <span id="house-id">#31-M042</span></h6>
        <button class="btn btn-sm btn-outline-danger rounded-pill" onclick="location.reload()">Ka bax</button>
      </div>

      <select class="form-select mb-3 rounded-4 p-3 border-0 bg-light fw-bold" id="type">
        <option>Cashuur Liisan</option>
        <option>Ardiyad</option>
        <option>Qashin</option>
        <option>Ganaax</option>
      </select>

      <div class="input-group mb-3">
        <input type="number" class="form-control p-3 border-0 bg-light fw-bold" id="amt" placeholder="Gali Lacagta ($)">
        <button class="btn btn-dark px-3" onclick="aiScan()">✨ AI Scan</button>
      </div>

      <div class="camera-grid">
        <div class="cam-btn" onclick="alert('Camera Ready!')">
          <i class="fas fa-receipt"></i>
          <span>SAWIR JUWANKA</span>
        </div>
        <div class="cam-btn" onclick="alert('Camera Ready!')">
          <i class="fas fa-home"></i>
          <span>WAJAHADA</span>
        </div>
      </div>

      <p class="text-center small text-muted mb-3" id="gps-info">
        <i class="fas fa-map-marker-alt"></i> GPS Ready: 9.5624, 44.0770
      </p>

      <button class="btn-action bg-success shadow-lg" onclick="saveData()">SAVE & UPDATE MAP</button>

      <!-- AI Support -->
      <div class="ai-box">
        <label class="small fw-bold text-primary mb-1">✨ Gemini AI Support</label>
        <div class="input-group input-group-sm">
          <input type="text" id="ai-q" class="form-control" placeholder="Weydii AI...">
          <button class="btn btn-primary" onclick="askAI()">Weydii</button>
        </div>
        <div id="ai-ans" class="small mt-2 text-muted italic" style="font-size: 11px;"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const apiKey = ""; // Gemini API Key will be handled by the environment

  // Clock
  function updateTime() {
    const now = new Date();
    document.getElementById('watch').innerText = now.toLocaleTimeString('so-SO');
    document.getElementById('full-date').innerText = now.toLocaleDateString('so-SO', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
    const hijri = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {day:'numeric', month:'long', year:'numeric'}).format(now);
    document.getElementById('hijri').innerText = "Hijri: " + hijri;
  }
  setInterval(updateTime, 1000);
  updateTime();

  // Login
  function doLogin() {
    const p = document.getElementById('pin').value;
    if(p === '2026' || p === '3131') {
      document.getElementById('login-sec').style.display = 'none';
      document.getElementById('main-sec').style.display = 'block';
    } else {
      alert("PIN-kaagu waa khaldan yahay!");
    }
  }

  // AI Assistant
  async function askAI() {
    const q = document.getElementById('ai-q').value;
    const ans = document.getElementById('ai-ans');
    if(!q) return;
    
    ans.innerText = "AI-ga ayaa ka fikiraya...";
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: q }] }],
          systemInstruction: { parts: [{ text: "Waxaad tahay kaaliye canshuuraha Hargeisa, u jawaab shaqaalaha si af Soomaali ah." }] }
        })
      });
      const data = await res.json();
      ans.innerText = data.candidates[0].content.parts[0].text;
    } catch(e) { ans.innerText = "Error!"; }
  }

  // AI Scan
  function aiScan() {
    document.getElementById('loader').style.display = 'flex';
    setTimeout(() => {
      document.getElementById('amt').value = "45.00";
      document.getElementById('loader').style.display = 'none';
      alert("✨ AI ayaa juwanka ka akhriyey: $45.00");
    }, 1500);
  }

  // Save
  function saveData() {
    document.getElementById('loader').style.display = 'flex';
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      alert("Xogta waa la keydiyey! Khariidada hadda waa Cagaar (Green).");
      document.getElementById('amt').value = '';
    }, 2000);
  }

  // Network
  window.addEventListener('offline', () => {
    document.getElementById('net-status').innerHTML = '<i class="fas fa-circle text-danger me-1"></i> Offline Mode';
  });
  window.addEventListener('online', () => {
    document.getElementById('net-status').innerHTML = '<i class="fas fa-circle text-success me-1"></i> Online';
  });
</script>

</body>
</html>
